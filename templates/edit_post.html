<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAKING_BBS // Edit Entry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .composer-container {
            max-width: 800px;
            margin: 40px auto;
            border: 1px solid var(--terminal-green);
            padding: 30px;
            background: rgba(0, 255, 0, 0.02);
        }
        .form-group {
            margin-bottom: 30px;
        }
        .form-label {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--terminal-green);
        }
        .form-control {
            width: 100%;
            background: #000;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }
        .form-control:focus {
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
        }
        textarea.form-control {
            min-height: 300px;
            resize: vertical;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            font-weight: bold;
        }
        .step {
            opacity: 0.5;
        }
        .step.active {
            opacity: 1;
            color: var(--terminal-black);
            background: var(--terminal-green);
            padding: 2px 10px;
        }
        .tx-id {
            font-size: 0.8rem;
            color: #fff;
            opacity: 0.5;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="terminal">
    <div class="container">
        <header class="terminal-nav">
            <div class="terminal-logo">
                <div class="logo terminal-prompt"><a href="/" style="color: #0f0; text-decoration: none;">STAKING_BBS V1.0</a></div>
            </div>
        </header>

        <section>
            <div class="composer-container">
                <div class="step-indicator">
                    <span class="step active">MODIFY_DATA_PACKET // ID_{{ post.id }}</span>
                </div>

                <div class="tx-id">AUTH_ID: {{ user.id[:16] }}... // STATUS: AUTHORIZED</div>

                <h1 class="terminal-prompt" style="font-size: 1.5rem;">UPDATE_REQUEST</h1>

                <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST">
                    <div class="form-group">
                        <label class="form-label">TITLE_PATCH</label>
                        <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">DATA_BLOCK_MODIFICATION</label>
                        <textarea name="content" class="form-control" required>{{ post.content }}</textarea>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; gap: 20px;">
                        <a href="{{ url_for('post_detail', post_id=post.id) }}" class="muted" style="text-decoration: none; border-bottom: 1px solid transparent;" onmouseover="this.style.borderBottom='1px solid var(--terminal-green)'" onmouseout="this.style.borderBottom='1px solid transparent'">ABORT_RECONFIGURATION</a>
                        <div style="display: flex; gap: 20px;">
                            {% if not post.live %}
                            <button type="button" onclick="makeLive('{{ post.id }}')" class="terminal-button" style="border-color: #ff0 !important; color: #ff0 !important;">MAKE_LIVE</button>
                            {% endif %}
                            <button type="submit" class="terminal-button">SAVE_CHANGES</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <script>
            const makeLive = async (postId) => {
                try {
                    const response = await fetch(`/post/${postId}/live`, {
                        method: 'POST'
                    });
    
                    if (response.status === 402) {
                        alert('STAKING_REQUIRED: YOU_MUST_PROVIDE_A_RESERVE_TO_ACTIVATE_TRANSMISSIONS.');
                        window.location.href = '/stake';
                        return;
                    }
    
                    const result = await response.json();
                    if (result.success) {
                        window.location.reload();
                    } else {
                        alert(`ERR: ACTIVATION_FAILED (${result.error || 'UNKNOWN'})`);
                    }
                } catch (err) {
                    console.error(err);
                    alert('ERR: NETWORK_ERROR_DURING_ACTIVATION');
                }
            };
        </script>

        <footer style="margin-top: 60px; text-align: center;">
            &copy; 2026 STAKING_BBS // SELF_CLEANING_PROTOCOL
        </footer>
    </div>
</body>
</html>
